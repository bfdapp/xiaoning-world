<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>彤彤最好的朋友</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    background:linear-gradient(180deg,#FFE4EC 0%,#FFF0F5 40%,#FFF8F0 100%);
    min-height:100vh; overflow-x:hidden;
}

/* ===== 首页 ===== */
.home{position:relative;min-height:100vh;padding:30px 20px 100px;z-index:2}

/* 浮动装饰 */
.floating{position:fixed;font-size:24px;pointer-events:none;z-index:0;opacity:0.5;animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-24px) rotate(12deg)}}

/* 头像区 */
.avatar-wrap{
    width:140px;height:140px;border-radius:50%;overflow:hidden;
    margin:14px auto 16px;border:5px solid rgba(255,182,193,0.5);
    box-shadow:0 8px 30px rgba(255,105,180,0.15);
}
.avatar-wrap img{width:100%;height:100%;object-fit:cover}
.name{text-align:center;font-size:30px;font-weight:700;color:#D63384;margin-bottom:3px;letter-spacing:2px}
.subtitle{text-align:center;font-size:14px;color:#FF69B4;margin-bottom:18px}

/* 每日卡 */
.daily-card{
    background:linear-gradient(135deg,#FF9A9E,#FECFEF);border-radius:18px;
    padding:18px 20px;color:#fff;margin-bottom:20px;
    box-shadow:0 4px 18px rgba(255,154,158,0.3);animation:pulse2 3s infinite;
}
.daily-card .title{font-size:14px;opacity:0.9;margin-bottom:6px}
.daily-card .content{font-size:16px;font-weight:600;line-height:1.5}
.daily-card .refresh{float:right;background:rgba(255,255,255,0.2);border:none;color:#fff;padding:4px 12px;border-radius:12px;cursor:pointer;font-size:12px;margin-top:8px}
@keyframes pulse2{0%,100%{box-shadow:0 4px 18px rgba(255,154,158,0.3)} 50%{box-shadow:0 6px 24px rgba(255,154,158,0.5)}}

/* 功能网格 */
.section-title{font-size:17px;font-weight:600;color:#D63384;margin-bottom:12px;margin-top:18px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.grid-btn{
    background:#fff;border:none;border-radius:16px;padding:18px 8px;
    cursor:pointer;box-shadow:0 2px 10px rgba(255,105,180,0.08);
    transition:all 0.15s;color:#555;font-size:13px;text-align:center;
    border:2px solid transparent;
}
.grid-btn:active{background:#FFE4EC;transform:scale(0.95);border-color:#FFB6C1}
.grid-btn .icon{font-size:28px;display:block;margin-bottom:6px}

/* 绿色通话按钮 */
.call-mega{
    display:block;width:100%;padding:18px;border:none;border-radius:24px;
    background:linear-gradient(135deg,#4CAF50,#66BB6A);
    color:#fff;font-size:20px;font-weight:700;cursor:pointer;
    box-shadow:0 6px 24px rgba(76,175,80,0.35);
    transition:all 0.2s;margin-bottom:10px;letter-spacing:2px;
}
.call-mega:active{transform:scale(0.97)}
.call-mega .sub{font-size:13px;font-weight:400;opacity:0.8;display:block;margin-top:4px}

/* ===== 通话界面 ===== */
.call-screen{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:linear-gradient(180deg,#FFB6C1,#FF69B4,#DB7093);
    flex-direction:column;z-index:100;
}
.call-screen.show{display:flex}

/* 通话顶部 */
.call-top{display:flex;align-items:center;padding:16px 18px;color:#fff;flex-shrink:0;gap:12px}
.call-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:16px;cursor:pointer}
.call-top-name{flex:1;font-size:18px;font-weight:600}
.call-top-time{font-size:14px;opacity:0.7}

/* 聊天记录 */
.call-chat{flex:1;overflow-y:auto;padding:0 16px 10px;scroll-behavior:smooth}
.call-msg{max-width:78%;padding:10px 16px;border-radius:18px;margin-bottom:8px;font-size:15px;line-height:1.5;animation:fadeUp 0.3s ease;word-break:break-word}
.call-msg.right{background:rgba(255,255,255,0.9);color:#333;border-top-right-radius:4px;margin-left:auto}
.call-msg.left{background:rgba(255,255,255,0.15);color:#fff;border-top-left-radius:4px}
.call-msg.system{text-align:center;font-size:13px;opacity:0.7;background:transparent;color:#fff;max-width:100%;padding:6px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)}}

/* 通话底部 */
.call-bottom{padding:12px 18px;flex-shrink:0}
.call-tips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;justify-content:center;flex-wrap:wrap}
.call-tip-btn{
    background:rgba(255,255,255,0.18);border:none;color:#fff;padding:8px 16px;
    border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;transition:all 0.15s;
}
.call-tip-btn:active{background:rgba(255,255,255,0.35);transform:scale(0.95)}
.call-tip-btn .tip-icon{font-size:16px;margin-right:4px}
.hangup-row{display:flex;justify-content:center;padding:6px 0 8px}
.hangup-btn{
    width:60px;height:60px;border-radius:50%;background:#ff3b30;color:#fff;
    border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(255,59,48,0.4);
    transition:all 0.15s;
}
.hangup-btn:active{transform:scale(0.9)}

/* 思考动画 */
.thinking{text-align:center;color:rgba(255,255,255,0.7);font-size:14px;padding:8px}
.thinking span{animation:dot 1.4s infinite;opacity:0}
.thinking span:nth-child(2){animation-delay:.2s}
.thinking span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,100%{opacity:0}50%{opacity:1}}
</style>
</head>
<body>

<!-- ===== 首页 ===== -->
<div class="home" id="home">
    <!-- 浮动装饰 -->
    <div class="floating" style="top:8%;left:5%">🌸</div>
    <div class="floating" style="top:15%;right:8%;animation-delay:1.5s">✨</div>
    <div class="floating" style="top:42%;left:3%;animation-delay:.8s">🦋</div>
    <div class="floating" style="top:60%;right:5%;animation-delay:2.2s">⭐</div>
    <div class="floating" style="bottom:30%;left:8%;animation-delay:3s">💖</div>

    <!-- 头像 -->
    <div class="avatar-wrap" style="text-align:center">
        <img src="https://picsum.photos/id/64/200/200" alt="彤彤">
    </div>
    <div class="name">彤彤</div>
    <div class="subtitle">💕 你最好的朋友，随时陪你聊天</div>

    <!-- 每日建议 -->
    <div class="daily-card" id="dailyCard">
        <div class="title">🌟 今日推荐</div>
        <div class="content" id="dailyContent">正在为你准备...</div>
        <button class="refresh" id="dailyRefresh">换一个 ↻</button>
    </div>

    <!-- 快捷功能 -->
    <div class="section-title">🎈 和彤彤一起玩</div>
    <div class="grid">
        <button class="grid-btn" data-topic="给我讲一个有趣的故事吧！"><span class="icon">📖</span>讲故事</button>
        <button class="grid-btn" data-topic="唱一首好听的儿歌给我听，把歌词也说出来"><span class="icon">🎵</span>唱儿歌</button>
        <button class="grid-btn" data-topic="出个简单好玩的谜语给我猜！"><span class="icon">🧩</span>猜谜语</button>
        <button class="grid-btn" data-topic="讲一个很好笑的笑话！"><span class="icon">😂</span>讲笑话</button>
        <button class="grid-btn" data-topic="教我一首简单的古诗吧"><span class="icon">📜</span>背古诗</button>
        <button class="grid-btn" data-topic="今天有什么有趣的小知识？"><span class="icon">🔍</span>小知识</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px">
        <button class="grid-btn" data-topic="我要睡觉了，给我讲一个温馨的睡前故事吧" style="border-color:#FFE4EC"><span class="icon">🌙</span>哄睡故事</button>
        <button class="grid-btn" data-topic="教我画一个简单可爱的小动物吧！"><span class="icon">🎨</span>学画画</button>
    </div>

    <!-- 打电话 -->
    <button class="call-mega" id="callBtn">📞 给彤彤打电话<p class="sub">想说什么都可以，彤彤一直陪着你</p></button>
</div>

<!-- ===== 通话界面 ===== -->
<div class="call-screen" id="callScreen">
    <div class="call-top">
        <button class="call-back" id="callBack">‹</button>
        <span class="call-top-name">🤳 彤彤</span>
        <span class="call-top-time" id="callTimer">00:00</span>
    </div>

    <div class="call-chat" id="callChat">
        <div class="call-msg left">你好呀！我是彤彤，你最好的朋友～很开心能陪你聊天！🌟</div>
        <div class="call-msg system">💡 直接跟我说话就行，我听着呢</div>
    </div>

    <div class="call-bottom">
        <div class="call-tips" id="callTips">
            <button class="call-tip-btn" data-topic="给我讲个故事吧"><span class="tip-icon">📖</span>讲故事</button>
            <button class="call-tip-btn" data-topic="唱首歌"><span class="tip-icon">🎵</span>唱歌</button>
            <button class="call-tip-btn" data-topic="出个谜语"><span class="tip-icon">🧩</span>谜语</button>
            <button class="call-tip-btn" data-topic="今天开心吗"><span class="tip-icon">😊</span>聊天</button>
        </div>
        <div class="hangup-row">
            <button class="hangup-btn" id="hangupBtn">📞</button>
        </div>
    </div>
</div>

<script>
// ========== 配置 ==========
const AI_KEY = 'sk-fbf04ae740c549ee9eb0fe357dbe98b0';
const TTS_URL = 'http://127.0.0.1:8081/tts';
const AI_URL = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';

// ========== AI 角色 ==========
const SYS = `你是彤彤，一个4岁小女孩最好的朋友和玩伴。

性格：温暖、活泼、有爱心的大姐姐，像真的朋友一样自然。

能力：
- 讲故事：即兴创作有趣可爱的儿童故事
- 唱儿歌：会唱所有中文经典儿歌（写出歌词）
- 猜谜语：出简单谜语让小朋友猜
- 讲笑话：简短有趣的笑话
- 教知识：用最简单的话回答"为什么"
- 教古诗：边背边解释意思
- 安慰：小朋友不开心时温柔安慰
- 哄睡：讲温馨的睡前故事

说话风格：
- 自然亲切，像真实的大姐姐
- 多夸："好棒""真聪明""太厉害啦"
- 用语气词：呀、哦、呢、啦、嘛
- 每段2-3句，简短易懂
- 偶尔加emoji：🌟✨💖🎈🌈🦋🌸🍭

安全：不说恐怖内容，不用复杂词汇`;

// ========== 状态 ==========
let onCall = false, speaking = false, recog = null, currentAudio = null;
let timerInterval = null, seconds = 0;

const $ = id => document.getElementById(id);

// ========== 每日推荐 ==========
const DAILY = [
    '今天来学一首古诗吧！📜',
    '彤彤想给你讲一个小蚂蚁的故事～🐜',
    '要不要猜一个好玩的小谜语？🧩',
    '我们一起唱"小星星"好不好？✨',
    '你知道为什么天是蓝的吗？我来告诉你！🔍',
    '讲一个好笑的笑话，保证你笑哈哈 😂',
    '学画一只可爱的小猫咪吧 🐱',
    '今天我们玩"我说你猜"的游戏 🎮',
    '给小熊讲一个睡前故事好不好？🌙',
    '咱们来玩"动物园里有什么"的游戏 🦁',
];
function updateDaily(){
    const c = $('dailyContent');
    c.style.opacity = '0.5';
    setTimeout(()=>{c.textContent = DAILY[Math.floor(Math.random()*DAILY.length)]; c.style.opacity='1'}, 200);
}
updateDaily();
$('dailyRefresh').addEventListener('click', updateDaily);

// ========== 语音 ==========
async function speak(text){
    if(currentAudio){currentAudio.pause();currentAudio=null}
    speechSynthesis.cancel(); speaking=true;
    try{
        const res = await fetch(TTS_URL+'?text='+encodeURIComponent(text));
        if(res.ok){
            const audio = new Audio(URL.createObjectURL(await res.blob()));
            currentAudio=audio;
            await new Promise(r=>{audio.onended=()=>{speaking=false;r()};audio.onerror=()=>{speaking=false;r()};audio.play()});
            return;
        }
    }catch(e){}
    // 降级
    const u=new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=0.85; u.pitch=1.3; u.volume=1;
    const v=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('zh')); if(v.length) u.voice=v[0];
    u.onend=()=>{speaking=false}; u.onerror=()=>{speaking=false}; speechSynthesis.speak(u);
}

// ========== AI ==========
async function askAI(msg){
    const res=await fetch(AI_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+AI_KEY},body:JSON.stringify({model:'qwen-turbo',messages:[{role:'system',content:SYS},{role:'user',content:msg}],temperature:0.85,max_tokens:400})});
    if(!res.ok) throw new Error(res.status);
    return (await res.json()).choices[0].message.content;
}

// ========== 聊天消息（通话中） ==========
function chatMsg(text, side){
    const d=document.createElement('div'); d.className='call-msg '+side; d.textContent=text;
    $('callChat').appendChild(d); $('callChat').scrollTop=9999;
}
function chatSystem(text){
    const d=document.createElement('div'); d.className='call-msg system'; d.textContent=text;
    $('callChat').appendChild(d); $('callChat').scrollTop=9999;
}
function chatThinking(){
    const d=document.createElement('div'); d.className='thinking'; d.id='thinking';
    d.innerHTML='彤彤在想<span>.</span><span>.</span><span>.</span>';
    $('callChat').appendChild(d); $('callChat').scrollTop=9999;
}
function chatRemoveThinking(){
    const t=$('thinking'); if(t) t.remove();
}

// ========== 快速话题（首页） ==========
document.querySelectorAll('.grid-btn').forEach(b=>{
    b.addEventListener('click',async ()=>{
        const topic = b.dataset.topic;
        b.style.transform='scale(0.95)'; setTimeout(()=>b.style.transform='',200);
        try{
            chatSystem('💬 '+b.querySelector('.icon')?.textContent+' '+b.textContent.trim());
            chatThinking();
            const reply=await askAI(topic);
            chatRemoveThinking();
            chatMsg(reply,'left');
            await speak(reply);
        }catch(e){chatRemoveThinking();chatMsg('网络有点小问题，点电话按钮跟我说话吧～','left')}
    });
});

// ========== 接通电话 ==========
async function startCall(){
    if(onCall) return; onCall=true; seconds=0;
    $('home').style.display='none';
    $('callScreen').classList.add('show');
    $('callChat').innerHTML='';
    chatMsg('你好呀！我是彤彤，你最好的朋友～很开心能陪你聊天！🌟','left');
    chatSystem('💡 直接跟我说话就行，我听着呢');

    // 计时
    timerInterval=setInterval(()=>{seconds++;const m=String(Math.floor(seconds/60)).padStart(2,'0'),s=String(seconds%60).padStart(2,'0');$('callTimer').textContent=m+':'+s},1000);

    // 请求麦克风
    navigator.mediaDevices?.getUserMedia({audio:true}).then(s=>s.getTracks().forEach(t=>t.stop())).catch(()=>{});

    setTimeout(()=>{
        speak('你好呀小朋友！我是彤彤，想聊天、听故事、唱歌都可以，你想做什么呀？').then(()=>setTimeout(startListen,500));
    },1200);
}

function endCall(){
    onCall=false;
    if(timerInterval){clearInterval(timerInterval);timerInterval=null}
    stopListen();
    speechSynthesis.cancel();speaking=false;
    if(currentAudio){currentAudio.pause();currentAudio=null}
    $('callScreen').classList.remove('show');
    $('home').style.display='block';
}

$('callBtn').addEventListener('click',startCall);
$('callBack').addEventListener('click',endCall);
$('hangupBtn').addEventListener('click',endCall);

// ========== 语音识别 ==========
function startListen(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR||!onCall||speaking||recog) return;
    const r=new SR(); r.lang='zh-CN'; r.continuous=false;
    r.onresult=async e=>{
        const txt=e.results[0][0].transcript.trim();
        stopListen();
        if(!txt){setTimeout(startListen,300);return}
        if(txt.includes('拜拜')||txt.includes('再见')||txt.includes('挂')){
            speak('拜拜啦小朋友，想我了就再打电话给我哦～💖').then(endCall);
            return;
        }
        chatMsg(txt,'right');
        chatThinking();
        try{
            const reply=await askAI(txt);
            chatRemoveThinking();
            chatMsg(reply,'left');
            await speak(reply);
        }catch(e){
            chatRemoveThinking();
            chatMsg('彤彤听到啦！能再说一遍吗～','left');
            speak('彤彤听到啦！能再说一遍吗～');
        }
        setTimeout(startListen,400);
    };
    r.onerror=()=>{stopListen();if(onCall)setTimeout(startListen,1000)};
    r.onend=()=>{stopListen();if(onCall&&!speaking)setTimeout(startListen,300)};
    recog=r; r.start();
}
function stopListen(){if(recog){try{recog.stop()}catch(e){}recog=null}}

// ========== 通话快速话题 ==========
document.querySelectorAll('.call-tip-btn').forEach(b=>{
    b.addEventListener('click',async ()=>{
        if(speaking) return;
        const topic=b.dataset.topic;
        chatMsg(topic,'right');
        chatThinking();
        try{
            const reply=await askAI(topic);
            chatRemoveThinking();
            chatMsg(reply,'left');
            await speak(reply);
        }catch(e){
            chatRemoveThinking();
            chatMsg('彤彤听到啦！','left');
        }
        if(onCall&&!speaking) setTimeout(startListen,400);
    });
});

console.log('💖 彤彤最好的朋友 v2 已启动');
console.log('🎤 声音：微软 Xiaoxiao 自然女声');
console.log('🧠 AI：通义千问');
</script>
</body>
</html>
